        function createPreviewCard(template) {
            const folder = template.folder || './';
            return `
                <div class="preview-card bg-gradient-to-br ${template.color} rounded-lg p-6 flex flex-col justify-center items-center text-center border border-white/10">
                    <div class="text-4xl mb-2">📄</div>
                    <div class="text-sm font-semibold text-white/90">${template.title}</div>
                    <div class="text-xs text-white/60 mt-1">${template.name}.html</div>
                </div>
            `;
        }

        function generateAllPreviews() {
            const container = document.getElementById('previews');
            container.innerHTML = templates.map(template => createPreviewCard(template)).join('');
            
            // Generate download links
            setTimeout(() => {
                templates.forEach(template => {
                    console.log(`Would create: ${template.name}-preview.png`);
                });
            }, 1000);
        }

        generateAllPreviews();
